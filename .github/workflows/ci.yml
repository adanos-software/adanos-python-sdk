name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install ".[dev]"

      - name: Run tests
        run: python -m pytest tests -q

      - name: Build wheel and sdist
        run: python -m build

      - name: Smoke install built SDK
        run: |
          python -m venv /tmp/social-stock-sentiment-smoke
          /tmp/social-stock-sentiment-smoke/bin/pip install dist/social_stock_sentiment-*.whl
          /tmp/social-stock-sentiment-smoke/bin/python - <<'PY'
          from stocksentiment import StockSentimentClient, __version__

          assert __version__
          client = StockSentimentClient(api_key="sk_live_example", base_url="https://api.adanos.org")
          assert client.reddit is not None
          assert client.news is not None
          client.close()
          PY
